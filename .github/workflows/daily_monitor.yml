name: Swiss Beauty Daily Monitor

on:
  schedule:
    - cron: "30 16 * * *"  # 10:00 PM IST — fetches today's posts
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
          SHEET_TAB_NAME: "Swiss Beauty"
          BRAND_NAME: "Swiss Beauty"
          BRAND_KEYWORDS: "Swiss Beauty,SwissBeauty,swiss beauty india"
          EXCLUDE_KEYWORDS: "switzerland,swiss alps,swiss army,swiss franc,zürich,zurich,swiss cheese,swiss miss,geneva,bern,lausanne,swiss made,swiss watch,swiss chocolate,swiss bank"
          # Swiss Beauty RSS feeds
          RSS_FEEDS: "LinkedIn|https://rss.app/feeds/ylvqTkeFXjn7jRBo.xml|no"
          RSS_FEEDS_2: "Reddit|https://rss.app/feeds/QuuIDvKATAncaqA7.xml|yes"
          RSS_FEEDS_3: "Google News|https://rss.app/feeds/g6mhwU1ZXisX9XYP.xml|yes"
          RSS_FEEDS_4: "X|https://rss.app/feeds/PVAJ8H37eWoMQySq.xml|yes"
          # Mars
          BRAND_2_NAME: "Mars"
          BRAND_2_KEYWORDS: "Mars Cosmetics,Mars by GHC,Mars"
          BRAND_2_TAB: "Mars"
          BRAND_2_EXCLUDE_KEYWORDS: "planet mars,mars rover,mars mission,elon musk,spacex,nasa,mars bar,mars chocolate,candy bar,snickers,red planet,space exploration"
          BRAND_2_RSS_FEEDS: "LinkedIn|https://rss.app/feeds/JGxIlsDvGV083wXA.xml|no"
          BRAND_2_RSS_FEEDS_2: "Reddit|https://rss.app/feeds/DwYXHpSWuRqrTd2v.xml|yes"
          BRAND_2_RSS_FEEDS_3: "Google News|https://rss.app/feeds/3ixQOnI02CXHE6mS.xml|yes"
          BRAND_2_RSS_FEEDS_4: "X|https://rss.app/feeds/QQZuTfNrXu48Xjt6.xml|yes"
          # Renee
          BRAND_3_NAME: "Renee Cosmetics"
          BRAND_3_KEYWORDS: "Renee Cosmetics,Renee"
          BRAND_3_TAB: "Renee"
          BRAND_3_RSS_FEEDS: "LinkedIn|https://rss.app/feeds/VAnQfqiYb8kHHNUc.xml|no"
          BRAND_3_RSS_FEEDS_2: "Reddit|https://rss.app/feeds/NGOzRd53svEYXwGH.xml|yes"
          BRAND_3_RSS_FEEDS_3: "Google News|https://rss.app/feeds/SfCHZo9zzmPo5CgG.xml|yes"
          BRAND_3_RSS_FEEDS_4: "X|https://rss.app/feeds/nc6XlDNc6A9mwDu0.xml|yes"
          # Blueheaven
          BRAND_4_NAME: "Blue Heaven"
          BRAND_4_KEYWORDS: "Blue Heaven,BlueHeaven,Blue Heaven cosmetics"
          BRAND_4_TAB: "Blueheaven"
          BRAND_4_RSS_FEEDS: "Reddit|https://www.reddit.com/search.rss?q=Blueheaven+cosmetics&sort=new|yes"
          BRAND_4_RSS_FEEDS_2: "Google News|https://rss.app/feeds/RbrjEvFAVEZeWJN4.xml|yes"
          BRAND_4_RSS_FEEDS_3: "X|https://rss.app/feeds/mdRjno2ADnYxhkZL.xml|yes"
          # Lakme
          BRAND_5_NAME: "Lakme"
          BRAND_5_KEYWORDS: "Lakme,Lakmé,Lakme India"
          BRAND_5_TAB: "Lakme"
          BRAND_5_RSS_FEEDS: "Reddit|https://rss.app/feeds/TvdKvvTDdZQ44otZ.xml|yes"
          BRAND_5_RSS_FEEDS_2: "Google News|https://rss.app/feeds/SRdJA1q6V5CL7XiB.xml|yes"
          BRAND_5_RSS_FEEDS_3: "X|https://rss.app/feeds/79K8NcR7NYVqZUiF.xml|yes"
          # Maybelline
          BRAND_6_NAME: "Maybelline"
          BRAND_6_KEYWORDS: "Maybelline,Maybelline India,Maybelline New York"
          BRAND_6_TAB: "Maybelline"
          BRAND_6_RSS_FEEDS: "Reddit|https://rss.app/feeds/cDdmQ1V1ylQM7tL6.xml|yes"
          BRAND_6_RSS_FEEDS_2: "Google News|https://rss.app/feeds/Sref0sVcVKJPEdSo.xml|yes"
          BRAND_6_RSS_FEEDS_3: "X|https://rss.app/feeds/oX1pw3e7jAo2WDSb.xml|yes"
          # Staze Beauty
          BRAND_7_NAME: "Staze Beauty"
          BRAND_7_KEYWORDS: "Staze Beauty,Staze"
          BRAND_7_TAB: "Stayz"
          BRAND_7_RSS_FEEDS: "Reddit|https://rss.app/feeds/FJHSc1Gigdci3zTo.xml|yes"
          BRAND_7_RSS_FEEDS_2: "Google News|https://rss.app/feeds/izwEaFGb6jWiz3vR.xml|yes"
          BRAND_7_RSS_FEEDS_3: "X|https://rss.app/feeds/yqgykvkGTbOwrK6o.xml|yes"
        run: python main.py
